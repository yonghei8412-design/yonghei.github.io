<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercedes-Benz MY26 어프로치북</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --silver: #c4c4c4;
    --gold: #b8983c;
    --white: #f8f6f2;
    --card-bg: #111111;
    --border: rgba(196,196,196,0.15);
    --tag-bg: rgba(184,152,60,0.12);
    --tag-border: rgba(184,152,60,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
  }
  .logo span { color: var(--gold); }
  .header-right {
    display: flex; align-items: center; gap: 24px;
  }
  .model-count {
    font-size: 11px;
    color: var(--silver);
    letter-spacing: 2px;
  }

  /* HERO */
  .hero {
    padding: 80px 32px 48px;
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(48px, 6vw, 88px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -1px;
  }
  .hero-title em {
    display: block;
    color: var(--gold);
    font-style: normal;
  }
  .hero-meta {
    text-align: right;
    font-size: 12px;
    color: var(--silver);
    letter-spacing: 2px;
    line-height: 2;
  }

  /* FILTER BAR */
  .filter-bar {
    position: sticky; top:64px; z-index:90;
    background: rgba(10,10,10,0.98);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
  }
  .filter-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-inner::-webkit-scrollbar { display:none; }
  .filter-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--silver);
    padding: 7px 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--silver); color: var(--white); }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
    font-weight: 700;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 1400px; margin: 0 auto;
    padding: 24px 32px 0;
  }
  .search-input {
    width: 100%; max-width: 400px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 10px 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: rgba(196,196,196,0.4); letter-spacing:1px; }
  .search-input:focus { border-bottom-color: var(--gold); }

  /* GRID */
  .grid-wrap {
    max-width: 1400px; margin: 0 auto;
    padding: 32px 32px 80px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-top: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 28px;
    cursor: pointer;
    transition: border-color 0.25s, transform 0.25s;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column; gap: 16px;
    animation: fadeUp 0.4s ease both;
  }
  .card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s;
  }
  .card:hover { border-color: rgba(184,152,60,0.4); transform: translateY(-2px); }
  .card:hover::before { transform: scaleX(1); }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }

  .card-category {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.15;
    color: var(--white);
  }
  .card-variant {
    font-size: 12px;
    color: var(--silver);
    letter-spacing: 1px;
  }
  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: -0.5px;
  }
  .card-price small {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--silver);
    font-weight: 300;
  }
  .card-divider {
    height: 1px;
    background: var(--border);
  }
  .card-specs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
  }
  .spec-item { display:flex; flex-direction:column; gap:2px; }
  .spec-label { font-size: 9px; letter-spacing:2px; color: rgba(196,196,196,0.5); text-transform:uppercase; }
  .spec-value { font-size: 13px; color: var(--white); font-weight: 400; }
  .card-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px;
  }
  .tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--tag-border);
    background: var(--tag-bg);
    color: var(--gold);
  }
  .tag.ev { border-color: rgba(100,200,150,0.4); background: rgba(100,200,150,0.08); color: #64c896; }
  .tag.amg { border-color: rgba(200,80,60,0.4); background: rgba(200,80,60,0.08); color: #e05040; }
  .tag.maybach { border-color: rgba(184,152,60,0.6); background: rgba(184,152,60,0.15); color: #d4aa50; }
  .tag.hybrid { border-color: rgba(120,180,220,0.4); background: rgba(120,180,220,0.08); color: #78b4dc; }

  /* DETAIL PANEL */
  .panel-overlay {
    display:none;
    position:fixed; inset:0; z-index:200;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  .panel-overlay.open { display:flex; align-items:stretch; justify-content:flex-end; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .panel {
    width: min(680px, 100vw);
    background: #0d0d0d;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    animation: slideIn 0.3s ease;
    padding: 0;
  }
  @keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
  .panel-header {
    position: sticky; top:0;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-close {
    background: none; border: none; color: var(--silver);
    cursor: pointer; font-size: 20px; line-height:1;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .panel-close:hover { color: var(--white); }
  .panel-body { padding: 28px; }
  .panel-cat { font-size:10px; letter-spacing:3px; color:var(--gold); margin-bottom:8px; }
  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300;
    line-height: 1.1; margin-bottom: 4px;
  }
  .panel-variant { font-size:13px; color:var(--silver); letter-spacing:1px; margin-bottom:20px; }
  .panel-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px; color: var(--gold); font-weight:300;
    letter-spacing:-1px; margin-bottom: 24px;
  }
  .panel-section-title {
    font-size: 9px; letter-spacing:3px; color:var(--gold);
    text-transform:uppercase; margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .panel-specs-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px 24px;
  }
  .panel-spec { display:flex; flex-direction:column; gap:3px; }
  .panel-spec-label { font-size:9px; letter-spacing:2px; color:rgba(196,196,196,0.45); text-transform:uppercase; }
  .panel-spec-value { font-size:14px; color:var(--white); font-weight:400; }
  .option-list { display:flex; flex-direction:column; gap:6px; }
  .option-item {
    font-size: 12px; color: var(--silver);
    padding: 7px 12px;
    border-left: 1px solid var(--border);
    line-height: 1.5;
    transition: border-color 0.2s, color 0.2s;
  }
  .option-item:hover { border-left-color: var(--gold); color: var(--white); }
  .option-group { margin-bottom: 16px; }
  .option-group-label {
    font-size:9px; letter-spacing:2px; color:rgba(184,152,60,0.7);
    text-transform:uppercase; margin-bottom:8px;
  }
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 32px;
    color: var(--silver);
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px;
    text-align: center;
    font-size: 11px;
    color: rgba(196,196,196,0.35);
    letter-spacing: 2px;
  }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .hero { padding: 48px 16px 32px; flex-direction:column; gap:16px; }
    .hero-meta { text-align: left; }
    .filter-bar { padding: 0 16px; }
    .search-wrap { padding: 16px 16px 0; }
    .grid-wrap { padding: 24px 16px 60px; }
    .grid { grid-template-columns: 1fr; gap: 1px; }
    .panel-specs-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
